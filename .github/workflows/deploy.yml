name: Deploy Java Azure Function
on:
  push:
    branches:
      - main

env:
  AZURE_FUNCTIONAPP_NAME: 'test-function-app-har'
  JAVA_VERSION: '17'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build with Maven
        run: mvn clean package azure-functions:package

      - name: Resolve package path
        id: pkg
        run: |
            echo "path=$(ls -d target/azure-functions/* | head -n 1)" >> $GITHUB_OUTPUT
      
      - name: Print resolved path
        run: |
         echo "Resolved path is:"
         echo "${{ steps.pkg.outputs.path }}"

      - name: Archive function app
        run: |
          mkdir -p output
          cd ${{ steps.pkg.outputs.path }}
          zip -r ../../../output/functionapp.zip .

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
         client-id: ${{ secrets.AZURE_CLIENT_ID }}
         tenant-id: ${{ secrets.AZURE_TENANT_ID }}
         subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy
        uses: Azure/functions-action@v1
        with:
         app-name: test-function-app-har
         package: './output/functionapp.zip'
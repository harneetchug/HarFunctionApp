name: Deploy Java Azure Function
on:
  push:
    branches:
      - main

env:
  AZURE_FUNCTIONAPP_NAME: 'test-function-app-har'
  JAVA_VERSION: '17'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build with Maven
        run: mvn clean package azure-functions:package

      - name: Debug path
        run: find . -type d -name "azure-functions"

      - name: Get package path
        id: package
        run: echo "PACKAGE_PATH=$(ls -d target/azure-functions/*)" >> $GITHUB_ENV

      - name: Deploy
        uses: Azure/functions-action@v1
        with:
          app-name: test-function-app-har
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          package: ${{ env.PACKAGE_PATH }}